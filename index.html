<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grocery Bagging</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Grocery Bagging</h1>
      <p class="hint">
        Drag items from the tray into the bag. Items snap to the grid and
        settle on top of whatever's below. Weight is shown; strength is not.
      </p>
      <div class="level-row">
        <span class="level-label">Level</span>
        <span id="level-name" class="level-name"></span>
      </div>
      <div class="clock-row">
        <span class="clock-label">Time</span>
        <span id="clock" class="clock-value">0.0s</span>
      </div>
    </header>

    <main class="play-area">
      <section class="bag-pane">
        <h2>Bag</h2>
        <div id="bag"></div>
      </section>
      <section class="tray-pane">
        <h2>Tray</h2>
        <div id="tray"></div>
        <div class="carry-pane">
          <button type="button" id="carry-btn" class="carry-btn">Carry</button>
          <div id="result" class="result" hidden>
            <div class="result-score">
              Score: <span id="result-score-value">0</span>
            </div>
            <div id="result-stars" class="result-stars" aria-label="Star rating"></div>
            <div id="result-breakdown" class="result-breakdown"></div>
          </div>
          <div id="win-banner" class="win-banner" hidden>
            <span id="win-banner-text">Level cleared!</span>
            <button type="button" id="next-level-btn" class="next-level-btn" hidden>
              Next level
            </button>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="src/game.js"></script>
  </body>
</html>
