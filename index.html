<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grocery Bagging — static slice</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Grocery Bagging</h1>
      <p class="hint">
        Static preview. Items are labelled with weight; strength is hidden by
        design.
      </p>
    </header>

    <main class="play-area">
      <section class="bag-pane">
        <h2>Bag</h2>
        <div id="bag"></div>
      </section>
      <section class="tray-pane">
        <h2>Tray</h2>
        <div id="tray"></div>
      </section>
    </main>

    <script type="module" src="src/game.js"></script>
  </body>
</html>
